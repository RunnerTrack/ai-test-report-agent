name: Run Tests

on:
  push:                    # Wenn du Code hochlädst (push)...
    branches: [ main ]     # ...auf dem main-Branch
  pull_request:            # Oder bei Pull Requests
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest  # Der Roboter benutzt Ubuntu Linux
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Lade deinen Code herunter
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'   # Python Version 3.11 benutzen
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt  # Installiere pytest usw.
        
    - name: Run tests
      run: |
        pytest tests/ -v    # Führe alle Tests aus
